_svd: "../svd/at32f423.svd"

_modify:
  name: AT32F423

_derive:
  TMR14: TMR10

TMR9,TMR10:
  _include:
    - common/tmr/dir.yaml

_include:
  - common/common.yaml
  - common/f423_435_437.yaml
  - common/crm/crm_v2.yaml
  - common/debug/pause_id.yaml
  - common/dma/extended.yaml
  - common/ertc/common.yaml
  - common/ertc/alarmb.yaml
  - common/ertc/wat.yaml
  - common/ertc/tspin.yaml
  - common/flash/v2.yaml
  - common/periph-v2.yaml
  - common/adc/common.yaml
  - common/adc/odt_vm.yaml
  - common/can/common.yaml
  - common/usart/common.yaml
  - common/usart/dbn.yaml
  - common/spi/common.yaml
  - common/spi/sts_cspas.yaml
  - common/pwc/vrsel.yaml
  - common/tmr/advanced.yaml
  - common/acc/common.yaml

_add:
  TMR14_RMP:
    description: "TMR14 channel 1 input remap register"
    baseAddress: "0x40002050"
    addressBlock:
      offset: 0x0
      size: 0x4
      usage: registers
    registers:
      RMP:
        description: "TMR14 channel 1 input remap"
        addressOffset: 0x0
        size: 32
        access: read-write
        resetValue: 0x00000000
        fields:
          TMR14_CH1_IRMP:
            description: "TMR14 channel 1 input remap"
            bitOffset: 6
            bitWidth: 2
