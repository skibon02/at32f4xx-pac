ETHERNET_MAC:
  MACCTRL:
    _add:
      CST:
        description: "CRC stripping for type frames"
        bitOffset: 25
        bitWidth: 1
    CST:
      NoStrip: [0, "CRC stripping disabled"]
      StrippingEnabled: [1, "CRC stripping enabled. The last four bytes (FCS) of the Ethernet type frame is stripped before being transmitted to the application"]
    WD:
      NoDisable: [0, "The MAC allows no more than 2048 bytes of the frames being received"]
      WatchdogDisabled: [1, "Watchdog disabled. The MAC disables the watchdog timer on the receiver, and can receive frames of up to 16,384 bytes"]
    JD:
      NoDisable: [0, "The MAC disables the Jabber timer on the transmitter, and can transfer frames of up to 16,384 bytes"]
      JabberDisabled: [1, "Jabber disabled. The MAC allows the application to send out more than 2048 bytes of data during transmission. The MAC does not cut off the transmitter if the application sends out more than 2048 bytes of data during transmission"]
    IFG:
      Ifg96Bit: [0, "Minimum interframe gap is 96 bits (12 bytes) during transmission"]
      Ifg88Bit: [1, "Minimum interframe gap is 88 bits (11 bytes) during transmission"]
      Ifg80Bit: [2, "Minimum interframe gap is 80 bits (10 bytes) during transmission"]
      Ifg72Bit: [3, "Minimum interframe gap is 72 bits (9 bytes) during transmission"]
      Ifg64Bit: [4, "Minimum interframe gap is 64 bits (8 bytes) during transmission"]
      Ifg56Bit: [5, "Minimum interframe gap is 56 bits (7 bytes) during transmission"]
      Ifg48Bit: [6, "Minimum interframe gap is 48 bits (6 bytes) during transmission"]
      Ifg40Bit: [7, "Minimum interframe gap is 40 bits (5 bytes) during transmission"]
    FES:
      Speed10Mbps: [0, "The MAC operates at 10 Mbps"]
      Speed100Mbps: [1, "The MAC operates at 100 Mbps"]
    LM:
      NoLoopback: [0, "Loopback mode disabled"]
      Loopback: [1, "Loopback mode. The MII receive clock input (clk_rx_i) is required for the loopback mode to work normally, for the transmit clock is not looped-back internally"]
    DM:
      HalfDuplex: [0, "Half-duplex mode"]
      FullDuplex: [1, "Full-duplex mode"]
    IPC:
      NoIpv4Checksum: [0, "IPv4 checksum calculation disabled"]
      Ipv4ChecksumEnabled: [1, "IPv4 checksum calculation enabled"]
    ACS:
      NoPadCrcStripping: [0, "The MAC will forward all received frames to the master without changing its contents"]
      AutomaticPadCrcStripping: [1, "The MAC strips the pad/FCS field on received frames only when the frame length is shorter than 1536 bytes. All received frame with length field greater than or equal to 1536 bytes are passed on to the application without stripping the Pad or FCS field"]
    TE:
      Disabled: [0, "Transmit disabled"]
      Enabled: [1, "Transmit enabled"]
    RE:
      Disabled: [0, "Receive disabled"]
      Enabled: [1, "Receive enabled"]

    # half-duplex mode only, rarely used
    _modify:
      DCS:
        description: "Only in half-duplex mode! Disable Carrier Sense"
      DRO:
        description: "Only in half-duplex mode! Disable Receive Own"
      DR:
        description: "Only in half-duplex mode! Disable Retry"
      BL:
        description: "Only in half-duplex mode! Back-off Limit"
      DC:
        description: "Only in half-duplex mode! Deferral check"
  MACFRMF:
    PR:
      Disable: [0, "Promiscuos mode disabled."]
      PassAll: [1, "The MAC passes all frames to the application"]
    HUC:
      Disable: [0, "Direct destination address comparison for unicast"]
      EnableHash: [1, "The MAC performs destination address filtering for unicast frames according to the hash table"]
    HMC:
      Disable: [0, "Direct destination address comparison for multicast"]
      EnableHash: [1, "The MAC performs destination address filtering for multicast frames according to the hash table"]
    DAIF:
      Normal: [0, "Work normally"]
      Inverse: [1, "The address check block operates in inverse filtering mode for the destination address comparison for both unicast and multicast frames"]
    PMC:
      Normal: [0, "Normal operation"]
      PassAll: [1, "All frames with a multicast destination address (first bit in the destination address is set) are passed"]
    DBF:
      PassBroadcast: [0, "The MAC passes all received broadcast frames to the application"]
      FilterBroadcast: [1, "The MAC filters all received broadcast frames and does not pass them to the application"]
    PCF:
      FilterAll: [0, "MAC filters all control frames and prevents them from reaching the application"]
      ForwardAllExceptPause: [1, "MAC forwards all control frames, except Pause frame, to the application even if they fail the address filter"]
      ForwardAll: [2, "MAC forwards all control frames to the application even if they fail the address filter"]
      ForwardFilter: [3, "MAC forwards control frames that pass the address filter to the application"]
    SAIF:
      Normal: [0, "Work normally"]
      Inverse: [1, "The address check block operates in inverse filtering mode for the source address comparison"]
    SAF:
      UpdateBit: [0, "If source address filter mismatches, updates the source address filter bit (SAF) in the receive status"]
      Drop: [1, "If source address filter mismatches, frame is dropped"]
    HPF:
      HashFilter: [0, "The MAC performs destination address filtering according to the hash table"]
      HashOrPerfectFilter: [1, "The MAC performs destination address filtering according to the hash table and perfect address filter. A frame is passed if it matches either the hash filter or the perfect address filter"]
    RA:
      Normal: [0, "Normal operation"]
      PassAll: [1, "Disable filters and pass all incoming frames"]
  MACFCTRL:
    FCB_BPA:
      _W1S:
        InitiatePause: [1, "Initiate a pause frame. After the completion of the Pause frame, this bit resets to 0"]
    ETF:
      Disabled: [0, "Transmit flow control disabled"]
      Enabled: [1, "Transmit flow control enabled"]
    ERF:
      Disabled: [0, "Receive flow control disabled"]
      Enabled: [1, "Receive flow control enabled"]
    DUP:
      OnlyMulticast: [0, "The MAC detects only a Pause frame with a unique multicast address"]
      AnyPause: [1, "The MAC detects the Pause frames with a unicast address specified in the MAC address0 high and MAC address0 low registers"]
    PLT:
      Minus4Slot: [0, "Pause time minus 4 slot times"]
      Minus28Slot: [1, "Pause time minus 28 slot times"]
      Minus144Slot: [2, "Pause time minus 144 slot times"]
      Minus256Slot: [3, "Pause time minus 256 slot times"]
    DZQP:
      Normal: [0, "Normal operation"]
      DisableZeroQuanta: [1, "Disables the automatic generation of Zero-quanta Pause frame while the flow control signal of the FIFO layer is disabled"]
    PT: [0, 0xFF]
  MACHTH,MACHTL:
    _delete: [HTH,HTL]
  MACMIIADDR:
    CR:
      CsrFreq60_100: [0, "CSR clock frequency is 60-100 MHz and MDC clock frequency is CSR/42 MHz"]
      CsrFreq100_150: [1, "CSR clock frequency is 100-150 MHz and MDC clock frequency is CSR/62 MHz"]
      CsrFreq20_35: [2, "CSR clock frequency is 20-35 MHz and MDC clock frequency is CSR/16 MHz"]
      CsrFreq35_60: [3, "CSR clock frequency is 35-60 MHz and MDC clock frequency is CSR/26 MHz"]
      CsrFreq150_250: [4, "CSR clock frequency is 150-250 MHz and MDC clock frequency is CSR/102 MHz"]
      CsrFreq250_288: [5, "CSR clock frequency is 250-288 MHz and MDC clock frequency is CSR/124 MHz"]
    MW:
      Write: [0, "Write operation"]
      Read: [1, "Read operation"]
    MB:
      _read:
        NoBusy: [0, "The MII is not busy, new operation can be started"]
        Busy: [1, "The MII is busy, operation in progress"]
      _write:
        NoBusy: [0, "The MII is not busy, new operation can be started"]
        StartOperation: [1, "Start an MII operation by writing 1 to this bit. This bit is automatically cleared by hardware when the operation is completed"]
    MII: [0, 0x1F]
    PA: [0, 0x1F]
  MACMIIDT:
    MD: [0, 0xFF]
  MACVLT:
    VTI: [0, 0xFF]
    ETV:
      Normal16bit: [0, "Full 16-bit VLAN tag is used for filtering"]
      Compressed12bit: [1, "12-bit VLAN tag is used for comparison and filtering."]
  MACIMR:
    TIM:
      InterruptDisabled: [0, "Timestamp interrupt is disabled"]
      InterruptEnabled: [1, "Timestamp interrupt is enabled"]
    PIM:
      InterruptDisabled: [0, "PMT interrupt is disabled"]
      InterruptEnabled: [1, "PMT interrupt is enabled"]
  _modify:
    MACHTH,MACHTL:
      writeConstraint: [0, 0xFFFFFFFF]
    MACA0H:
      description: "Ethernet MAC address 0 high register. This register changed to 16 bits wide, because the only available another field is bit 31 - AE, but it is restricted to be always 1."
      resetValue: 0xFFFF
    MACA2H:
      resetValue: 0x0000FFFF
    MACA?L:
      size: 32
      writeConstraint: [0, 0xFFFFFFFF]
  MACA0H:
    _delete: [AE]
  MACA?L:
    _delete: [MA?L]
  MACA[123]H:
    AE:
      Disabled: [0, "Second MAC address filter is disabled"]
      Enabled: [1, "Second MAC address filter is enabled"]
    SA:
      Source: [0, "Second MAC address filter is used for source address filtering"]
      Destination: [1, "Second MAC address filter is used for destination address filtering"]
    MBC: [0, 0x3F]
  MACA?H:
    MA?H: [0, 0xFFFF]
  MACPMTCTRLSTS:
    _modify:
      RRWF,RMP:
        access: "read-only"
    RRWF,RMP:
      _RC: {}
    RRWF:
      NoWakeup: [0, "No remote wakeup frame has been received since the last read of this register"]
      WakeupReceived: [1, "Remote wakeup frame has been received since the last read of this register"]
    RMP:
      NoMagicPacket: [0, "No Magic Packet has been received since the last read of this register"]
      MagicPacketReceived: [1, "Magic Packet has been received since the last read of this register"]
    GUC:
      Disable: [0, "Normal operation"]
      GlobalUnicast: [1, "All unicast packets filtered by the MAC address filters are treated as wakeup frames. If any of these packets is received, a PMT event is generated"]
    RWFFPR:
      _W1S:
        ResetPointer: [1, "Resets the remote frame filter register pointer to 3’b000"]
    PD:
      _W1S:
        PowerDown: [1, "Power down. Power back up when receive expected Magic packet or clear this bit"]
    EMP:
      Disable: [0, "Disable magic packet detection"]
      Enable: [1, "Enable magic packet detection. Power management event is generated when a magic packet is received."]
    ERWF:
      Disable: [0, "Disable remote wakeup frame detection"]
      Enable: [1, "Enable remote wakeup frame detection. Power management event is generated when a remote wakeup frame is received."]
  MACISTS:
    _modify:
      "*":
        access: "read-only"
    TIS:
      _RC:
        NoTimestamp: [0, "No timestamp interrupt"]
        TimestampInterrupt: [1, "System time value equals or exceeds the value programmed in the destination time registers"]
    MTIS:
      NoMmcTransmit: [0, "No MMC transmit interrupt"]
      MmcTransmitInterrupt: [1, "Interrupt event is generated in the EMAC_MMCTI register."]
    MRIS:
      NoMmcReceive: [0, "No MMC receive interrupt"]
      MmcReceiveInterrupt: [1, "Interrupt event is generated in the EMAC_MMCRI register."]
    MIS:
      NoMmc: [0, "No MMC interrupt"]
      MmcInterrupt: [1, "Interrupt event is generated in the EMAC_MMCRI or EMAC_MMCTI register."]
    PIS:
      NoPMT: [0, "No PMT interrupt"]
      PmtInterrupt: [1, "Magic packet or a remote wakeup event is received in power-down mode"]
ETHERNET_DMA:
  DMABM:
    AAB:
      Disabled: [0, "Address aligned beats disabled"]
      Enabled: [1, "Address aligned beats enabled. Applicable to GMAC only"]
    PBLx8:
      Normal: [0, "Not multiply PBL value"]
      Mul8: [1, "Multiply PBL value by 8 for the DMA burst length"]
    USP:
      Shared: [0, "PBL value is applicable to both transmit and receive DMA"]
      Separate: [1, "Separate PBL value for transmit and receive DMA. RX uses RDB, TX uses PBL"]
    RDP: [0, 0x3F]
    FB:
      AllowIncr: [0, "Allow using INCR bursts for higher throughput"]
      OnlyFixed: [1, "Use only SINGLE/INCR4/INCR8/INCR16 bursts. The DMA does not use INCR burst transfers, making bus occupation more predictable"]
    PR:
      Ratio1_1: [0, "1:1"]
      Ratio1_2: [1, "1:2"]
      Ratio1_3: [2, "1:3"]
      Ratio1_4: [3, "1:4"]
    PBL: [0, 0x3F]
    _add:
      EDE:
        description: "Enhanced descriptor enable"
        bitOffset: 7
        bitWidth: 1
    EDE:
      Normal: [0, "Normal descriptor format"]
      Enhanced: [1, "Enhanced descriptor format, descriptor size increased to 8 words"]
    DSL: [0, 0x1F]
    DA:
      CustomPriority: [0, "Custom priority ration between RX and TX. Controlled by PR"]
      FixedPriority: [1, "Tx has priority over Rx. Or otherwise, depending on bit 27 (TXPR)"]
    SWR:
      _read:
        NoReset: [0, "Software reset is not active"]
        Resetting: [1, "Software reset is active. This flag will be cleared when valid clocks are detected on appropriate pins"]
      _write:
        NoReset: [0, "No reset"]
        StartReset: [1, "Begin reset. Set this bit to reset the DMA"]
  DMASTS:
    EB:
      RxDmaTransfer: [0, "Error during Rx DMA transfer"]
      TxDmaTransfer: [3, "Error during Tx DMA transfer"]
      RxDmaDescriptorWriteAccess: [4, "Error during write access to Rx DMA descriptor"]
      TxDmaDescriptorWriteAccess: [5, "Error during write access to Tx DMA descriptor"]
      RxDmaDescriptorReadAccess: [6, "Error during read access to Rx DMA descriptor"]
      TxDmaDescriptorReadAccess: [7, "Error during read access to Tx DMA descriptor"]
    TS:
      Stopped: [0, "Stopped. Rest or Stop transmit command issued"]
      RunningFetching: [1, "Running. Fetching receive descriptor"]
      RunningWaiting: [2, "Running. Waiting for status"]
      RunningReading: [3, "Running. Reading data from host memory buffer and queuing it to Tx FIFO"]
      Timestamp: [4, "Time stamp write status"]
      Suspended: [6, "Suspended. Transmit descriptor unavailable or transmit buffer underflow"]
      RunningClosing: [7, "Running. Closing transmit descriptor"]

    RS:
      Stopped: [0, "Stopped. Rest or Stop transmit command issued"]
      RunningFetching: [1, "Running. Fetching receive descriptor"]
      RunningWaiting: [3, "Running. Waiting for receive packet"]
      Suspended: [4, "Suspended. Receive descriptor unavailable"]
      RunningClosing: [5, "Running. Closing receive descriptor"]
      Timestamp: [6, "Time stamp write status"]
      RunningTransferring: [7, "Running. Transferring the receive buffer data to host memory"]
    NIS:
      _W1C:
        Clear: [1, "Clear this interrupt flag by writing 1 to it"]
      _read:
        NoInterrupt: [0, "No normal interrupt"]
        NormalInterrupt: [1, "TI | TBU | RI | ERI"]
    AIS:
      _W1C:
        Clear: [1, "Clear this interrupt flag by writing 1 to it"]
      _read:
        NoInterrupt: [0, "No abnormal interrupt"]
        AbnormalInterrupt: [1, "TPS | TJT | OVF | UNF | RBU | RPS | RWT | ETI | FBEI"]
    ERI,FBEI,ETI,RWT,RPS,RBU,RI,UNF,OVF,TJT,TBU,TPS,TI:
      _W1C:
        Clear: [1, "Clear this interrupt flag by writing 1 to it"]
      _read:
        NoInterrupt: [0, "No interrupt"]
        Interrupt: [1, "Interrupt occurred"]
    MMI:
      _read:
        NoMmcInterrupt: [0, "No MMC interrupt"]
        MmcInterrupt: [1, "MMC interrupt occurred"]
    MPI:
      _read:
        NoPmtInterrupt: [0, "No PMT interrupt"]
        PmtInterrupt: [1, "PMT interrupt occurred"]
    TTI:
      _read:
        NoTimestampInterrupt: [0, "No timestamp interrupt"]
        TimestampInterrupt: [1, "Timestamp interrupt occurred"]
  DMAOPM:
    SSR:
      Stop: [0, "Receive is stopped"]
      Start: [1, "Receive is started or resumed"]
    OSF:
      Normal: [0, "Operate on the first descriptor in the list of receive descriptors"]
      Next: [1, "Process second frame before status of first is obtained"]
    RTC:
      Thr64: [0, "Threshold for short frames is 64 bytes"]
      Thr32: [1, "Threshold for short frames is 32 bytes"]
      Thr96: [2, "Threshold for short frames is 96 bytes"]
      Thr128: [3, "Threshold for short frames is 128 bytes"]
    FUGF:
      Normal: [0, "Drop frames less than 64 bytes"]
      PassUndersized: [1, "Forward undersized frames < 64 bytes if no error"]
    FEF:
      Normal: [0, "Forward all frames except those with errors"]
      PassError: [1, "Forward all frames including those with CRC/collision/watchdog/overflow errors"]
    SSTC:
      Stop: [0, "Transmit is stopped"]
      Start: [1, "Transmit is started or resumed"]
    TTC:
      Thr64: [0, "Threshold for short frames is 64 bytes"]
      Thr128: [1, "Threshold for short frames is 128 bytes"]
      Thr192: [2, "Threshold for short frames is 192 bytes"]
      Thr256: [3, "Threshold for short frames is 256 bytes"]
      Thr40: [4, "Threshold for short frames is 40 bytes"]
      Thr32: [5, "Threshold for short frames is 32 bytes"]
      Thr24: [6, "Threshold for short frames is 24 bytes"]
      Thr16: [7, "Threshold for short frames is 16 bytes"]
    FTF:
      _W1S:
        Flush: [1, "Flush the transmit FIFO. This bit is automatically cleared by hardware when the flush operation is completed"]
    TSF:
      Disable: [0, "Transmit store and forward disabled"]
      Enable: [1, "Transmit store and forward enabled. Transmission starts when a full frame resides in the Tx FIFO, and the TTC values specified in the bit [16: 14] are ignored"]
    DFRF:
      Normal: [0, "Normal operation, flush RX DMA if descriptors are unavailable"]
      DontFlush: [1, "Rx DMA does not flush any receive frame due to the unavailability of receive descriptors or receive buffers"]
    RSF:
      Disable: [0, "Receive store and forward disabled"]
      Enable: [1, "Receive store and forward enabled. The MTL reads the Rx FIFO only after a full frame is written to the Rx FIFO, ignoring the RTC bit"]
    DT:
      Normal: [0, "Normal operation"]
      DontDropErrorFrames: [1, "Don't drop frames with checksum errors in encapsulated payload. However ethernet checksum (FCS) must be valid"]
  DMAIE:
    "*":
      Disabled: [0, "Interrupt disabled"]
      Enabled: [1, "Interrupt enabled"]
  _modify:
    DMARDLADDR:
      size: 32
    DMATDLADDR:
      size: 32
    DMACTD,DMACRD:
      size: 32
    DMACTBADDR,DMACRBADDR:
      size: 32
    DMARPD,DMATPD:
      access: "write-only"

  DMARDLADDR:
    _delete: [SRL]
  DMATDLADDR:
    _delete: [STL]
  DMACTD:
    _delete: [HTDAP]
  DMACRD:
    _delete: [HRDAP]
  DMACTBADDR:
    _delete: [HTBAP]
  DMACRBADDR:
    _delete: [HRBAP]
  DMARPD:
    _modify:
      RPD:
        access: "write-only"
    RPD:
      _write:
        Poll: [0, "When these bits are written with any value, the DMA reads the current descriptor pointed to by the EMAC_DMACRD. If the descriptor is not available (owned by host), the reception suspends, and the bit 7 (RU) is set in the status register. If the descriptor is available, the reception resumes."]
  DMATPD:
    _modify:
      TPD:
        access: "write-only"
    TPD:
      _write:
        Poll: [0, "When these bits are written with any value, the DMA reads the current descriptor pointed to by the EMAC_DMACTD. If the descriptor is not available (owned by host), the transmission suspends, and the bit 2 (TU) is set in the status register. If the descriptor is available, the transmission resumes."]
  DMAMFBOCNT:
    "*":
      _RC: {}
    MFC: [0, 0xFFFF]
    OBMFC:
      NoOverflow: [0, "No overflow of MFC field"]
      Overflow: [1, "Overflow of MFC field. The MFC field is reset to 0 when this bit is set"]
    OFC: [0, 0x7FF]
    OBFOC:
      NoOverflow: [0, "No overflow of OFC field"]
      Overflow: [1, "Overflow of OFC field. The OFC field is reset to 0 when this bit is set"]
