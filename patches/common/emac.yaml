ETHERNET_MAC:
  MACCTRL:
    _add:
      CST:
        name: "CRC stripping for type frames."
        description: "When this bit is set, the last four bytes (FCS) of the Ethernet type frame is stripped before being transmitted to the application."
        bitOffset: 25
        bitWidth: 1
    CST:
      NoStrip: [0, "CRC stripping disabled"]
      StrippingEnabled: [1, "CRC stripping enabled. The last four bytes (FCS) of the Ethernet type frame is stripped before being transmitted to the application"]
    WD:
      NoDisable: [0, "The MAC allows no more than 2048 bytes of the frames being received"]
      WatchdogDisabled: [1, "Watchdog disabled. The MAC disables the watchdog timer on the receiver, and can receive frames of up to 16,384 bytes"]
    JD:
      NoDisable: [0, "The MAC disables the Jabber timer on the transmitter, and can transfer frames of up to 16,384 bytes"]
      JabberDisabled: [1, "Jabber disabled. The MAC allows the application to send out more than 2048 bytes of data during transmission. The MAC does not cut off the transmitter if the application sends out more than 2048 bytes of data during transmission"]
    IFG:
      Ifg96Bit: [0, "Minimum interframe gap is 96 bits (12 bytes) during transmission"]
      Ifg88Bit: [1, "Minimum interframe gap is 88 bits (11 bytes) during transmission"]
      Ifg80Bit: [2, "Minimum interframe gap is 80 bits (10 bytes) during transmission"]
      Ifg72Bit: [3, "Minimum interframe gap is 72 bits (9 bytes) during transmission"]
      Ifg64Bit: [4, "Minimum interframe gap is 64 bits (8 bytes) during transmission"]
      Ifg56Bit: [5, "Minimum interframe gap is 56 bits (7 bytes) during transmission"]
      Ifg48Bit: [6, "Minimum interframe gap is 48 bits (6 bytes) during transmission"]
      Ifg40Bit: [7, "Minimum interframe gap is 40 bits (5 bytes) during transmission"]
    FES:
      Speed10Mbps: [0, "The MAC operates at 10 Mbps"]
      Speed100Mbps: [1, "The MAC operates at 100 Mbps"]
    LM:
      NoLoopback: [0, "Loopback mode disabled"]
      Loopback: [1, "Loopback mode. The MII receive clock input (clk_rx_i) is required for the loopback mode to work normally, for the transmit clock is not looped-back internally"]
    DM:
      HalfDuplex: [0, "Half-duplex mode"]
      FullDuplex: [1, "Full-duplex mode"]
    IPC:
      NoIpv4Checksum: [0, "IPv4 checksum calculation disabled"]
      Ipv4ChecksumEnabled: [1, "IPv4 checksum calculation enabled"]
    ACS:
      NoPadCrcStripping: [0, "The MAC will forward all received frames to the master without changing its contents"]
      AutomaticPadCrcStripping: [1, "The MAC strips the pad/FCS field on received frames only when the frame length is shorter than 1536 bytes. All received frame with length field greater than or equal to 1536 bytes are passed on to the application without stripping the Pad or FCS field"]
    TE:
      Disabled: [0, "Transmit disabled"]
      Enabled: [1, "Transmit enabled"]
    RE:
      Disabled: [0, "Receive disabled"]
      Enabled: [1, "Receive enabled"]

    # half-duplex mode only, rarely used
    _modify:
      DCS:
        description: "Only in half-duplex mode! Disable Carrier Sense"
      DRO:
        description: "Only in half-duplex mode! Disable Receive Own."
      DR:
        description: "Only in half-duplex mode! Disable Retry"
      BL:
        description: "Only in half-duplex mode! Back-off Limit"
      DC:
        description: "Only in half-duplex mode! Deferral check"
  MACMIIADDR:
    CR:
      CsrFreq60_100: [0, "CSR clock frequency is 60-100 MHz and MDC clock frequency is CSR/42 MHz"]
      CsrFreq100_150: [1, "CSR clock frequency is 100-150 MHz and MDC clock frequency is CSR/62 MHz"]
      CsrFreq20_35: [2, "CSR clock frequency is 20-35 MHz and MDC clock frequency is CSR/16 MHz"]
      CsrFreq35_60: [3, "CSR clock frequency is 35-60 MHz and MDC clock frequency is CSR/26 MHz"]
      CsrFreq150_250: [4, "CSR clock frequency is 150-250 MHz and MDC clock frequency is CSR/102 MHz"]
      CsrFreq250_288: [5, "CSR clock frequency is 250-288 MHz and MDC clock frequency is CSR/124 MHz"]
    MW:
      Write: [0, "Write operation"]
      Read: [1, "Read operation"]
    MB:
      _read:
        NoBusy: [0, "The MII is not busy, new operation can be started"]
        Busy: [1, "The MII is busy, operation in progress"]
      _write:
        NoBusy: [0, "The MII is not busy, new operation can be started"]
        StartOperation: [1, "Start an MII operation by writing 1 to this bit. This bit is automatically cleared by hardware when the operation is completed"]
  MACIMR:
    TIM:
      InterruptDisabled: [0, "Timestamp interrupt is disabled"]
      InterruptEnabled: [1, "Timestamp interrupt is enabled"]
    PIM:
      InterruptDisabled: [0, "PMT interrupt is disabled"]
      InterruptEnabled: [1, "PMT interrupt is enabled"]
  _modify:
    MACMIIDT:
      size: 16
      writeConstraint: [ 0, 0xFFFF ]
    MACA0H:
      size: 16
      writeConstraint: [ 0, 0xFFFF ]
      resetValue: 0xFFFF
    MACA?L:
      size: 32
      writeConstraint: [0, 0xFFFFFFFF]
  MACMIIDT:
    _delete: [MD]
  MACA0H:
    _delete: [MA0H, AE]
  MACA?L:
    _delete: [MA0L]
  MACA[123]H:
    AE:
      Disabled: [0, "Second MAC address filter is disabled"]
      Enabled: [1, "Second MAC address filter is enabled"]
    SA:
      Source: [0, "Second MAC address filter is used for source address filtering"]
      Destination: [1, "Second MAC address filter is used for destination address filtering"]
ETHERNET_DMA:
  DMABM:
    PR:
      Ratio1_1: [0, "1:1"]
      Ratio1_2: [1, "1:2"]
      Ratio1_3: [2, "1:3"]
      Ratio1_4: [3, "1:4"]
    DA:
      CustomPriority: [0, "Custom priority ration between RX and TX. Controlled by PR"]
      FixedPriority: [1, "Tx has priority over Rx. Or otherwise, depending on bit 27 (TXPR)"]
    SWR:
      _read:
        NoReset: [0, "Software reset is not active"]
        Resetting: [1, "Software reset is active. This flag will be cleared when valid clocks are detected on appropriate pins"]
      _write:
        NoReset: [0, "No reset"]
        StartReset: [1, "Begin reset. Set this bit to reset the DMA"]
  DMASTS:
    EB:
      RxDmaTransfer: [0, "Error during Rx DMA transfer"]
      TxDmaTransfer: [3, "Error during Tx DMA transfer"]
      RxDmaDescriptorWriteAccess: [4, "Error during write access to Rx DMA descriptor"]
      TxDmaDescriptorWriteAccess: [5, "Error during write access to Tx DMA descriptor"]
      RxDmaDescriptorReadAccess: [6, "Error during read access to Rx DMA descriptor"]
      TxDmaDescriptorReadAccess: [7, "Error during read access to Tx DMA descriptor"]
    TS:
      Stopped: [0, "Stopped. Rest or Stop transmit command issued"]
      RunningFetching: [1, "Running. Fetching receive descriptor"]
      RunningWaiting: [2, "Running. Waiting for status"]
      RunningReading: [3, "Running. Reading data from host memory buffer and queuing it to Tx FIFO"]
      Timestamp: [4, "Time stamp write status"]
      Suspended: [6, "Suspended. Transmit descriptor unavailable or transmit buffer underflow"]
      RunningClosing: [7, "Running. Closing transmit descriptor"]

    RS:
      Stopped: [0, "Stopped. Rest or Stop transmit command issued"]
      RunningFetching: [1, "Running. Fetching receive descriptor"]
      RunningWaiting: [3, "Running. Waiting for receive packet"]
      Suspended: [4, "Suspended. Receive descriptor unavailable"]
      RunningClosing: [5, "Running. Closing receive descriptor"]
      Timestamp: [6, "Time stamp write status"]
      RunningTransferring: [7, "Running. Transferring the receive buffer data to host memory"]
    NIS:
      _W1C: {}
      NoInterrupt: [0, "No normal interrupt"]
      NormalInterrupt: [1, "TI | TBU | RI | ERI"]
    AIS:
      _W1C: {}
      NoInterrupt: [0, "No abnormal interrupt"]
      AbnormalInterrupt: [1, "TPS | TJT | OVF | UNF | RBU | RPS | RWT | ETI | FBEI"]
    "ERI,FBEI,ETI,RWT,RPS,RBU,RI,UNF,OVF,TJT,TBU,TPS,TI":
      _W1C: {}
  DMAIE:
    "*":
      Disabled: [0, "Interrupt disabled"]
      Enabled: [1, "Interrupt enabled"]
  _modify:
    DMARPD:
      size: 32
      writeConstraint: [ 0, 0xFFFFFFFF ]
    DMATPD:
      size: 32
      writeConstraint: [ 0, 0xFFFFFFFF ]
    DMARDLADDR:
      size: 32
      writeConstraint: [ 0, 0xFFFFFFFF ]
    DMATDLADDR:
      size: 32
      writeConstraint: [ 0, 0xFFFFFFFF ]

  DMARPD:
    _delete: [RPD]
  DMATPD:
    _delete: [TPD]
  DMARDLADDR:
    _delete: [SRL]
  DMATDLADDR:
    _delete: [STL]
