ERTC:
  _array:
    BPR*DT: {}
  _modify:
    DIV:
      description: "Divider register"
    BPR*DT:
      writeConstraint: [0, 0xffffffff]
  TIME:
    SU: [0, 0xF]
    ST: [0, 0x7]
    MU: [0, 0xF]
    MT: [0, 0x7]
    HU: [0, 0xF]
    HT: [0, 0x3]
    AMPM:
      AM: [0, "AM"]
      PM: [1, "PM"]
  DATE:
    DU: [0, 0xF]
    DT: [0, 0x3]
    MU: [0, 0xF]
    MT: [0, 0x1]
    YU: [0, 0xF]
    YT: [0, 0xF]
  CTRL:
    TSEDG:
      Rising: [0, "Rising edge"]
      Falling: [1, "Falling edge"]
    RCDEN:
      _read:
        Disabled: [0, "Reference clock detection is disabled"]
        Enabled: [1, "Reference clock detection is enabled"]
      _write:
        Disable: [0, "Reference clock detection disable"]
        Enable: [1, "Reference clock detection enable"]
    DREN:
      _read:
        Disabled: [0, "Date/time register direct read is disabled"]
        Enabled: [1, "Date/time register direct read is enabled"]
      _write:
        Disable: [0, "Date/time register direct read disable"]
        Enable: [1, "Date/time register direct read enable"]
    HM:
      Hour24: [0, "24-hour format"]
      Hour12: [1, "12-hour format"]
    AL?EN:
      _read:
        Disabled: [0, "Alarm is disabled"]
        Enabled: [1, "Alarm is enabled"]
      _write:
        Disable: [0, "Alarm disable"]
        Enable: [1, "Alarm enable"]
    TSEN:
      _read:
        Disabled: [0, "Timestamp is disabled"]
        Enabled: [1, "Timestamp is enabled"]
      _write:
        Disable: [0, "Timestamp disable"]
        Enable: [1, "Timestamp enable"]
    AL?IEN:
      _read:
        Disabled: [0, "Alarm interrupt is disabled"]
        Enabled: [1, "Alarm interrupt is enabled"]
      _write:
        Disable: [0, "Alarm interrupt disable"]
        Enable: [1, "Alarm interrupt enable"]
    TSIEN:
      _read:
        Disabled: [0, "Timestamp interrupt is disabled"]
        Enabled: [1, "Timestamp interrupt is enabled"]
      _write:
        Disable: [0, "Timestamp interrupt disable"]
        Enable: [1, "Timestamp interrupt enable"]
    _modify:
      ADD1H:
        access: "write-only"
      DEC1H:
        access: "write-only"
    ADD1H:
      _W1S:
        Add: [1, "Add 1 hour"]
    DEC1H:
      _W1S:
        Sub: [1, "Subtract 1 hour"]
    BPR: [0, 1]
    CALOSEL:
      Hz512: [0, "512Hz"]
      Hz1: [1, "1Hz"]
    OUTP:
      High: [0, "High"]
      Low: [1, "Low"]
    OUTSEL:
      Disabled: [0, ""]
      AlarmA: [1, "Alarm clock A"]
      Wakeup: [3, "Wakeup events"]
    CALOEN:
      _read:
        Disabled: [0, "Calibration output is disabled"]
        Enabled: [1, "Calibration output is enabled"]
      _write:
        Disable: [0, "Calibration output disable"]
        Enable: [1, "Calibration output enable"]
  STS:
    UPDF,AL?F,TSF,TSOF,TP?F:
      _W0C: {}

  DIV:
    _modify:
      DIVA:
        description: "Divider A"
      DIVB:
        description: "Divider B"
    DIVB: [0, 0x7FF]
    DIVA: [0, 0x7F]
  WP:
    CMD:
      _write:
        Key1: [0xCA, "Unlock key 1"]
        Key2: [0x53, "Unlock key 2"]
        Invalid: [0x00, "Write value 0x00 which is considered invalid and will activate write protection back"]
  BPR*DT:
    _delete:
      - DT
  ALA:
    SU: [0, 0xF]
    ST: [0, 0x7]
    MASK1:
      NoMask: [0, "No second mask"]
      Mask: [1, "Alarm clock doesn't care about seconds"]
    MU: [0, 0xF]
    MT: [0, 0x7]
    MASK2:
      NoMask: [0, "No minute mask"]
      Mask: [1, "Alarm clock doesn't care about minutes"]
    HU: [0, 0xF]
    HT: [0, 0x3]
    AMPM:
      AM: [0, "AM"]
      PM: [1, "PM"]
    MASK3:
      NoMask: [0, "No hour mask"]
      Mask: [1, "Alarm clock doesn't care about hours"]
    DU: [0, 0xF]
    DT: [0, 0x3]
    WKSEL:
      Date: [0, "Date"]
      WeekDay: [1, "Week day"]
    MASK4:
      NoMask: [0, "Date/week day is not masked"]
      Mask: [1, "Alarm clock doesn't care about date/week day"]
  ALASBS:
    SBS: [0, 0x7F]
    SBSMSK: [0, 0xF]
  SBS:
    SBS: [0, 0xFFFF]
    _modify:
      SBS:
        description: "Subsecond is the value in the DIVB counter. Clock frequency = ERTC_CLK/(DIVA+1)"
  TADJ:
    _modify:
      ADD1S:
        description: "Add 1 second. This bit can be written only when TADJF=0. It is intended to be used with DECSBS in order to fine-tune the time"
      DECSBS:
        description: "Decrease sub-second value. Delay (ADD1S=0): Delay = DECSBS/(DIVB+1). Advance (ADD1S=1) : Advance =1-(DECSBS/(DIVB+1))"
    ADD1S:
      NoEffect: [0, "No effect"]
      AddOneSecond: [1, "Add one second"]
    DECSBS: [0, 0x7FFF]
  TSTM:
    AMPM:
      AM: [0, "AM"]
      PM: [1, "PM"]
    HT: [0, 0x3]
    HU: [0, 0xF]
    MT: [0, 0x7]
    MU: [0, 0xF]
    ST: [0, 0x7]
    SU: [0, 0xF]
  TSDT:
    MT: [0, 0x1]
    MU: [0, 0xF]
    DT: [0, 0x3]
    DU: [0, 0xF]
  DATE,TSDT:
    WK:
      _name: WeekDay
      Monday: [1, "Monday"]
      Tuesday: [2, "Tuesday"]
      Wednesday: [3, "Wednesday"]
      Thursday: [4, "Thursday"]
      Friday: [5, "Friday"]
      Saturday: [6, "Saturday"]
      Sunday: [7, "Sunday"]
  TSSBS:
    SBS: [0, 0xFF]
  SCAL:
    ADD:
      None: [0, "No effect"]
      OneClkEvery2_11Cycles: [1, "One ERTC_CLK is inserted every 2^11 ERTC_CLK cycles"]
    CAL8:
      None: [0, "No effect"]
      Period8Seconds: [1, "8-second calibration"]
    CAL16:
      None: [0, "No effect"]
      Period16Seconds: [1, "16-second calibration"]
    DEC: [0, 0x1F]
  TAMP:
    OUTTYPE:
      OpenDrain: [0, "Open-drain"]
      PushPull: [1, "Push-pull"]
    TPPU:
      Enabled: [0, "Tamper detection pull-up enabled"]
      Disabled: [1, "Tamper detection pull-up disabled"]
    TPPR:
      Cyc1: [0, "1 ERTC_CLK cycle"]
      Cyc2: [1, "2 ERTC_CLK cycles"]
      Cyc4: [2, "4 ERTC_CLK cycles"]
      Cyc8: [3, "8 ERTC_CLK cycles"]
    TPFLT:
      NoFilter: [0, "No filter"]
      Filter2: [1, "Tamper is detected after 2 consecutive samples"]
      Filter4: [2, "Tamper is detected after 4 consecutive samples"]
      Filter8: [3, "Tamper is detected after 8 consecutive samples"]
    TPFREQ:
      Div32768: [0, "ERTC_CLK/32768"]
      Div16384: [1, "ERTC_CLK/16384"]
      Div8192: [2, "ERTC_CLK/8192"]
      Div4096: [3, "ERTC_CLK/4096"]
      Div2048: [4, "ERTC_CLK/2048"]
      Div1024: [5, "ERTC_CLK/1024"]
      Div512: [6, "ERTC_CLK/512"]
      Div256: [7, "ERTC_CLK/256"]
    TPTSEN:
      Disabled: [0, "Tamper detection timestamp disabled"]
      Enabled: [1, "Tamper detection timestamp enabled"]
    TP[12]EDG:
      RisingOrLow: [0, "If TPFLT=0: Rising edge.\nIf TPFLT>0: low level"]
      FallingOrHigh: [1, "If TPFLT=0: Falling edge.\nIf TPFLT>0: High level"]
    TP[12]EN:
      Disabled: [0, "Tamper detection disabled"]
      Enabled: [1, "Tamper detection enabled"]
    TPIEN:
      Disabled: [0, "Tamper interrupt disabled"]
      Enabled: [1, "Tamper interrupt enabled"]
