CRM:
  PLLCFG:
    _modify:
      PLL_NS:
        name: NS
      PLL_MS:
        name: MS
      PLL_FR:
        name: FR
    FR:
      _name: PostDivision
      Div4: [2, "Division by 4"]
      Div8: [3, "Division by 8"]
      Div16: [4, "Division by 16"]
      Div32: [5, "Division by 32"]
    NS: [31, 500]
    MS: [1, 15]

  CFG:
    CLKOUT1_SEL:
      HICK: [0, "HICK clock selected as CLKOUT1"]
      LEXT: [1, "LEXT clock selected as CLKOUT1"]
      HEXT: [2, "HEXT clock selected as CLKOUT1"]
      PLL: [3, "PLL clock selected as CLKOUT1"]
    CLKOUT2_SEL1:
      SCLK: [0, "SCLK clock selected as CLKOUT2"]
      Secondary: [1, "Secondary clock selected as CLKOUT2 (controlled by CLKOUT2_SEL2 bit in the CRM_MISC1 register)"]
      HEXT: [2, "HEXT clock selected as CLKOUT2"]
      PLL: [3, "PLL clock selected as CLKOUT2"]
    CLKOUT?DIV1:
      Div1: [-1, "CLKOUT%s is divided by 1"]
      Div2: [4, "CLKOUT%s is divided by 2"]
      Div3: [5, "CLKOUT%s is divided by 3"]
      Div4: [6, "CLKOUT%s is divided by 4"]
      Div5: [7, "CLKOUT%s is divided by 5"]
  MISC1:
    CLKOUT2_SEL2:
      Usb: [0, "USB clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Adc: [1, "ADC clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      HICKDiv: [2, "HICK (after divider) clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Lick: [3, "LICK clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Lext: [4, "LEXT clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]

    CLKOUT?DIV2:
      Div1: [-1, "CLKOUT%s is divided by 1"]
      Div2: [8, "CLKOUT%s is divided by 2"]
      Div4: [9, "CLKOUT%s is divided by 4"]
      Div8: [10, "CLKOUT%s is divided by 8"]
      Div16: [11, "CLKOUT%s is divided by 16"]
      Div64: [12, "CLKOUT%s is divided by 64"]
      Div128: [13, "CLKOUT%s is divided by 128"]
      Div256: [14, "CLKOUT%s is divided by 256"]
      Div512: [15, "CLKOUT%s is divided by 512"]
    HICK_TO_SCLK:
      HICKDiv6: [0, "Fixed 8 MHz, that is, HICK/6"]
      HICKDiv: [1, "48 MHz or 8 MHz, depending on the HICKDIV"]
    HICK_TO_USB:
      PLLDiv: [0, "PLL or PLL division"]
      HICKDiv: [1, "48 MHz or 8 MHz, depending on the HICKDIV"]
    HICKDIV:
      Div6: [0, "HICK is divided by 6 to generate the SCLK and USB clock when HICK_TO_SCLK or HICK_TO_USB is set to HICKDiv"]
      Div1: [1, "HICK is not divided"]
  MISC2:
    AUTO_STEP_EN:
      Disabled: [0, "Auto step mode disabled"]
      Enabled: [3, "Auto step mode enabled. When AHBDIV or SCLKSEL is modified, the auto step-by-step system clock switch is activated automatically."]
    CLK_TO_TMR:
      Disconnected: [0, "Disconnected"]
      Connected: [1, "CLKOUT1 internal connected to timer10 channel1"]
    USBDIV:
      Div1_5: [0, "USB clock is divided by 1.5"]
      Div1: [1, "USB clock is not divided"]
      Div2_5: [2, "USB clock is divided by 2.5"]
      Div2: [3, "USB clock is divided by 2"]
      Div3_5: [4, "USB clock is divided by 3.5"]
      Div3: [5, "USB clock is divided by 3"]
      Div4_5: [6, "USB clock is divided by 4.5"]
      Div4: [7, "USB clock is divided by 4"]
      Div5_5: [8, "USB clock is divided by 5.5"]
      Div5: [9, "USB clock is divided by 5"]
      Div6_5: [10, "USB clock is divided by 6.5"]
      Div6: [11, "USB clock is divided by 6"]
      Div7: [12, "USB clock is divided by 7"]