CRM:
  CTRL:
    HICKEN:
      _read:
        Disabled: [0, "High speed internal clock is disabled"]
        Enabled: [1, "High speed internal clock is enabled"]
      _write:
        Disable: [0, "High speed internal clock disable"]
        Enable: [1, "High speed internal clock enable"]
    HICKSTBL:
      _read:
        NotReady: [0, "Not ready"]
        Ready: [1, "Ready"]
      HICKCAL:
        description: "High speed internal clock calibration. Note: This bit can be written only if the HICKCAL_KEY[7: 0] is set as 0x5A"
        access: "read-write"
    HICKCAL: [0, 0xFF]
    HEXTEN:
      _read:
        Disabled: [0, "High speed external crystal is disabled"]
        Enabled: [1, "High speed external crystal is enabled"]
      _write:
        Disable: [0, "High speed external crystal disable"]
        Enable: [1, "High speed external crystal enable"]
    HEXTSTBL:
      _read:
        NotReady: [0, "Not ready"]
        Ready: [1, "Ready"]
    HEXTBYPS:
      _read:
        Disabled: [0, "High speed external crystal bypass is disabled"]
        Enabled: [1, "High speed external crystal bypass is enabled"]
      _write:
        Disable: [0, "High speed external crystal bypass disable"]
        Enable: [1, "High speed external crystal bypass enable"]
    CFDEN:
      _read:
        Disabled: [0, "Clock failure detector is disabled"]
        Enabled: [1, "Clock failure detector is enabled"]
      _write:
        Disable: [0, "Clock failure detector disable"]
        Enable: [1, "Clock failure detector enable"]
    PLLEN:
      _read:
        Disabled: [0, "PLL is disabled"]
        Enabled: [1, "PLL is enabled"]
      _write:
        Disable: [0, "PLL disable"]
        Enable: [1, "PLL enable"]
    PLLSTBL:
      _read:
        NotReady: [0, "Not ready"]
        Ready: [1, "Ready"]
  AHBEN,AHBEN?,APB?EN:
    _strip_end: "EN"
  AHBRST,AHBRST?,APB?RST:
    _strip_end: "RST"
  CFG:
    SCLKSEL,SCLKSTS:
      HICK: [0, "System clock from HICK"]
      HEXT: [1, "System clock from HEXT"]
      PLL: [2, "System clock from PLL"]
    AHBDIV:
      SCLK: [-1, "The SCLK is used as AHB clock"] # Same for [0, 7]
      Div2: [8, "SCLK divided by 2"]
      Div4: [9, "SCLK divided by 4"]
      Div8: [10, "SCLK divided by 8"]
      Div16: [11, "SCLK divided by 16"]
      Div64: [12, "SCLK divided by 64"]
      Div128: [13, "SCLK divided by 128"]
      Div256: [14, "SCLK divided by 256"]
      Div512: [15, "SCLK divided by 512"]
    APB?DIV:
      HCLK: [-1, "The divided HCLK is used as APB clock"] # Same for [0, 3]
      Div2: [4, "HCLK divided by 2"]
      Div4: [5, "HCLK divided by 4"]
      Div8: [6, "HCLK divided by 8"]
      Div16: [7, "HCLK divided by 16"]