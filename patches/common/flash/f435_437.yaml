FLASH:
  PSR:
    NZW_BST_STS:
      Disabled: [0, "NZW_BST is disabled"]
      Enabled: [1, "NZW_BST is enabled."]
    NZW_BST:
      Disabled: [0, "NZW_BST disabled"]
      Enabled: [1, "NZW_BST enabled."]
    _modify:
      NZW_BST:
        description: "Flash non-zero wait area boost. Flash read access is faster for NZW flash range, frequency is limited: 108/160/192MHZ at 1.1/1.2/1.3 LDO voltage"
  DIVR:
    "FDIV,FDIV_STS":
      _name: FlashDiv
      Div2: [ 0, "Flash clock frequency = HCLK/2" ]
      Div3: [ 1, "Flash clock frequency = HCLK/3" ]
      Div4: [ -1, "Flash clock frequency = HCLK/4" ]
  CONTR:
    FCONTR_EN:
      Disabled: [0, "Flash continue read disabled"]
      Enabled: [1, "Flash continue read enabled. Faster reads, but more power consumption"]
  CTRL1:
    USDULKS:
      _read:
        Locked: [0, "User system data unlocked"]
        Unlocked: [1, "User system data locked"]
      _write:
        Relock: [0, "Lock user system data"]
    USDERS:
      _write:
        NoStart: [0, "User system data erase operation not started"]
        Start: [1, "Start of user system data erase operation"]
      _read:
        NotStarted: [0, "User system data erase operation not started"]
        Started: [1, "User system data erase operation is in progress"]
    USDPRGM:
      _write:
        NoStart: [0, "User system data program operation not started"]
        Start: [1, "Start of user system data program operation"]
      _read:
        NotStarted: [0, "User system data program operation not started"]
        Started: [1, "User system data program operation is in progress"]
  CTRL?:
    BLKERS:
      NotBlockErase: [0, "Not block erase operation"]
      BlockErase: [1, "Erase operation is block erase operation"]
    BANKERS:
      NotBankErase: [0, "Not bank erase operation"]
      BankErase: [1, "Erase operation is bank erase operation"]
  CRC_CTRL:
    CRC_SS: [0, 0xFFF]
    CRC_SN: [0, 0xFFF]
    CRC_STRT:
      _W1S:
        Start: [1, "Start CRC calculation"]
