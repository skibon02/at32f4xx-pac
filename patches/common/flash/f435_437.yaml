FLASH:
  PSR:
    NZW_BST:
      Disabled: [0, "NZW_BST disabled"]
      Enabled: [1, "NZW_BST enabled. Flash read access is faster for NZW flash range, frequency is limited: 108/160/192MHZ at 1.1/1.2/1.3 LDO voltage"]
  DIVR:
    "FDIV,FDIV_STS":
      _name: FlashDiv
      Div2: [ 0, "Flash clock frequency = HCLK/2" ]
      Div3: [ 1, "Flash clock frequency = HCLK/3" ]
      Div4: [ -1, "Flash clock frequency = HCLK/4" ]

  CONTR:
    FCONTR_EN:
      Disabled: [0, "Flash continue read disabled"]
      Enabled: [1, "Flash continue read enabled. Faster reads, but more power consumption"]
  CTRL:
    ODFIE:
      Disabled: [0, "Operation done interrupt disabled"]
      Enabled: [1, "Operation done interrupt enabled"]
    ERRIE:
      Disabled: [0, "Error interrupt disabled"]
      Enabled: [1, "Error interrupt enabled"]
    USDULKS:
      Locked: [0, "User system data unlocked"]
      Unlocked: [1, "User system data locked"]
    OPLK:
      Locked: [0, "Flash operations unlocked"]
      Unlocked: [1, "Flash operations locked"]
    ERSTR:
      _write:
        NoStart: [0, "Erase operation not started"]
        Start: [1, "Start of erase operation"]
      _read:
        NotStarted: [0, "Erase operation not started"]
        Started: [1, "Erase operation is in progress"]
    USDERS:
      _write:
        NoStart: [0, "User system data erase operation not started"]
        Start: [1, "Start of user system data erase operation"]
      _read:
        NotStarted: [0, "User system data erase operation not started"]
        Started: [1, "User system data erase operation is in progress"]
    USDPRGM:
      _write:
        NoStart: [0, "User system data program operation not started"]
        Start: [1, "Start of user system data program operation"]
      _read:
        NotStarted: [0, "User system data program operation not started"]
        Started: [1, "User system data program operation is in progress"]
    BLKERS:
      NotBlockErase: [0, "Not block erase operation"]
      BlockErase: [1, "Erase operation is block erase operation"]
    BANKERS:
      NotBankErase: [0, "Not bank erase operation"]
      BankErase: [1, "Erase operation is bank erase operation"]
    SECERS:
      NotSectorErase: [0, "Not sector erase operation"]
      SectorErase: [1, "Erase operation is sector erase operation"]
    FPRGM:
      _write:
        NoStart: [0, "Flash program not started"]
        Start: [1, "Start of flash program operation"]
      _read:
        NotStarted: [0, "Flash program not started"]
        Started: [1, "Flash program is in progress"]
  "STS":
    "ODF,EPPERR,PRGMERR":
      _W1C: {}
  _derive:
    CTRL2: CTRL
    STS2: STS
    UNLOCK2: UNLOCK
    ADDR2: ADDR
  _modify:
    EPPS?:
      size: 32
  EPPS?:
    _delete: [epps]
_include: [unlock.yaml]