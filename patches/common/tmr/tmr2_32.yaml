TMR2:
  _modify:
    CVAL:
      size: 32
      writeConstraint: [0, 0xFFFFFFFF]
    PR:
      size: 32
      writeConstraint: [0, 0xFFFFFFFF]
      resetValue: 0x0000FFFF
    C*DT:
      size: 32
      writeConstraint: [0, 0xFFFFFFFF]
  CVAL:
    _delete:
      - CVAL
  PR:
    _delete:
      - PR
  CTRL1:
    PMEN:
      bit16: [0, "CVAL, PR and CxDT are 16-bit"]
      bit32: [1, "CVAL, PR and CxDT are extended from 16-bit to 32-bit"]
  C*DT:
    _delete:
      - C?DT
