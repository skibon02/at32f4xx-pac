_include:
  - crm/crm_v2.yaml
  - f423_435_437.yaml
  - ertc/common.yaml
  - ertc/alarmb.yaml
  - ertc/wat.yaml
  - ertc/tspin.yaml
  - debug/pause_id.yaml
  - periph-v2.yaml
  - adc/common.yaml
  - adc/odt_vm.yaml
  - flash/f435_437.yaml
  - flash/unlock.yaml
  - comms.yaml
  - usart/dbn.yaml
  - crc/poly.yaml
  - spi/sts_cspas.yaml
