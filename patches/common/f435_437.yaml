_derive:
  TMR5: TMR2

TMR2:
  _delete:
    _registers:
      - TMR2_RMP

_add:
  TMR2_RMP:
    description: "TMR2 channel 1 input remap register"
    baseAddress: "0x40000050"
    addressBlock:
      offset: 0x0
      size: 0x4
      usage: registers
    registers:
      RMP:
        description: "TMR2 channel 1 input remap"
        addressOffset: 0x0
        size: 32
        access: read-write
        resetValue: 0x00000000
        fields:
          TMR2_CH1_IRMP:
            description: "TMR2 channel 1 input remap"
            bitOffset: 10
            bitWidth: 2
  TMR5_RMP:
    description: "TMR5 channel 4 input remap register"
    baseAddress: "0x40000C50"
    addressBlock:
      offset: 0x0
      size: 0x4
      usage: registers
    registers:
      RMP:
        description: "TMR5 channel 4 input remap"
        addressOffset: 0x0
        size: 32
        access: read-write
        resetValue: 0x00000000
        fields:
          TMR5_CH4_IRMP:
            description: "TMR5 channel 4 input remap"
            bitOffset: 6
            bitWidth: 2

CRM:
  CFG:
    CLKOUT1_SEL:
      HICK: [0, "HICK clock selected as CLKOUT1"]
      LEXT: [1, "LEXT clock selected as CLKOUT1"]
      HEXT: [2, "HEXT clock selected as CLKOUT1"]
      PLL: [3, "PLL clock selected as CLKOUT1"]
    CLKOUT2_SEL1:
      SCLK: [0, "SCLK clock selected as CLKOUT2"]
      Secondary: [1, "Secondary clock selected as CLKOUT2 (controlled by CLKOUT2_SEL2 bit in the CRM_MISC1 register)"]
      HEXT: [2, "HEXT clock selected as CLKOUT2"]
      PLL: [3, "PLL clock selected as CLKOUT2"]
    CLKOUT?DIV1:
      Div1: [-1, "Clock output is divided by 1"]
      Div2: [4, "Clock output is divided by 2"]
      Div3: [5, "Clock output is divided by 3"]
      Div4: [6, "Clock output is divided by 4"]
      Div5: [7, "Clock output is divided by 5"]
  MISC1:
    CLKOUT2_SEL2:
      Usb: [0, "USB clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Adc: [1, "ADC clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      HICKDiv: [2, "HICK (after divider) clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Lick: [3, "LICK clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]
      Lext: [4, "LEXT clock selected as CLKOUT2 when CLKOUT2_SEL1 is set to Secondary"]

    CLKOUT?DIV2:
      Div1: [-1, "Clock output is divided by 1"]
      Div2: [8, "Clock output is divided by 2"]
      Div4: [9, "Clock output is divided by 4"]
      Div8: [10, "Clock output is divided by 8"]
      Div16: [11, "Clock output is divided by 16"]
      Div64: [12, "Clock output is divided by 64"]
      Div128: [13, "Clock output is divided by 128"]
      Div256: [14, "Clock output is divided by 256"]
      Div512: [15, "Clock output is divided by 512"]
  MISC2:
    CLK_TO_TMR:
      Disconnected: [0, "Disconnected"]
      Connected: [1, "CLKOUT1 internal connected to timer10 channel1"]
DMA?:
  STS:
    _array:
      "DTERRF*":
        description: "Channel %s data transfer error event flag"
        dimIndex: "1,2,3,4,5,6,7"
      "HDTF*":
        description: "Channel %s half transfer event flag"
        dimIndex: "1,2,3,4,5,6,7"
      "FDTF*":
        description: "Channel %s data transfer complete event flag"
        dimIndex: "1,2,3,4,5,6,7"
      "GF*":
        description: "Channel %s global event flag"
        dimIndex: "1,2,3,4,5,6,7"

  CLR:
    "*":
      _W1C: {}

    _array:
      "DTERRFC*":
        description: "Channel %s data transfer error flag clear"
        dimIndex: "1,2,3,4,5,6,7"
      "HDTFC*":
        description: "Channel %s half transfer flag clear"
        dimIndex: "1,2,3,4,5,6,7"
      "FDTFC*":
        description: "Channel %s data transfer complete flag clear"
        dimIndex: "1,2,3,4,5,6,7"
      "GFC*":
        description: "Channel %s global flag clear"
        dimIndex: "1,2,3,4,5,6,7"

  _cluster:
    ChannelMux%s:
      description: "Channel %s mux"
      MUXC?CTRL:
        name: MUXCTRL
        description: "DMA channel mux control register"
        SYNCPOL:
          NoEvents: [ 0, "No events" ]
          RisingEdge: [ 1, "Rising edge" ]
          FallingEdge: [ 2, "Falling edge" ]
          BothEdges: [ 3, "Rising and falling edges" ]
  MUXSYNCSTS:
    _array:
      SYNCOVF?:
        description: "Channel %s synchronization overrun flag"
        dimIndex: "1,2,3,4,5,6,7"
  MUXSYNCCLR:
    _array:
      SYNCOVFC?:
        description: "Channel %s synchronization overrun flag clear"
        dimIndex: "1,2,3,4,5,6,7"
    SYNCOVFC?:
      _W1C: {}
  MUXGSTS:
    _array:
      TRGOVF?:
        description: "Channel %s trigger overrun flag"
        dimIndex: "1,2,3,4,5,6,7"
    _modify:
      TRGOVF?:
        access: "read-only"
  MUXGCLR:
    _array:
      TRGOVFC?:
        description: "Channel %s trigger overrun flag clear"
        dimIndex: "1,2,3,4,5,6,7"
    TRGOVFC?:
      _W1C: {}

ADCCOM:
  CSTS:
    _array:
      RDY?:
        description: ADC%s conversion ready flag
      OCCO?:
        description: ADC%s overrun flag
      OCCS?:
        description: ADC%s ordinary channel conversion start flag
      PCCS?:
        description: ADC%s preempted channel conversion start flag
      PCCE?:
        description: ADC%s preempted channel conversion end flag
      OCCE?:
        description: ADC%s ordinary channel conversion end flag
      VMOR?:
        description: ADC%s voltage monitoring out of range flag
  CCTRL:
    MSSEL:
      NonCombined: [0, "Non-combined mode"]
      CombinedOrdinaryPreempted: [1, "Combined ordinary simultaneous+preempted simultaneous modes (single slave)"]
      CombinedOrdinaryAlternate: [2, "Combined ordinary simultaneous+alternate preempted trigger modes (single slave)"]
      PreemptedSimultaneous: [5, "Preempted simultaneous mode (single slave)"]
      OrdinarySimultaneous: [6, "Ordinary simultaneous mode (single slave)"]
      OrdinaryShift: [7, "Ordinary shift mode (single slave)"]
      AlternatePreemptedTrigger: [9, "Alternate preempted trigger mode (single slave)"]
      CombinedOrdinaryPreemptedDual: [17, "Combined ordinary simultaneous+preempted simultaneous modes (dual slaves)"]
      CombinedOrdinaryAlternateDual: [18, "Combined ordinary simultaneous+alternate preempted trigger modes (dual slaves)"]
      PreemptedSimultaneousDual: [21, "Preempted simultaneous mode (dual slaves)"]
      OrdinarySimultaneousDual: [22, "Ordinary simultaneous mode (dual slaves)"]
      OrdinaryShiftDual: [23, "Ordinary shift mode (dual slaves)"]

    MSDRCEN:
      Disabled: [0, "MSDRC disabled"]
      Enabled: [1, "MSDRC enabled"]
    _modify:
      MSDMASEL_H:
        description: "MSDMASEL[2] — high bit of ordinary channel DMA transfer mode select for master/slave mode. Combined with MSDMASEL_L to form MSDMASEL[2:0]. 0: No DMA transfer, 1: DMA mode 1, 2: DMA mode 2, 3: DMA mode 3, 4: DMA mode 4, 5: DMA mode 5. 6~7: Unused, do not configure"
      MSDMASEL_L:
        description: "MSDMASEL[1:0] — low bits of ordinary channel DMA transfer mode select for master/slave mode. Combined with MSDMASEL_H to form MSDMASEL[2:0]. 0: No DMA transfer, 1: DMA mode 1, 2: DMA mode 2, 3: DMA mode 3, 4: DMA mode 4, 5: DMA mode 5. 6~7: Unused, do not configure"
      ADCDIV:
        description: "ADC division: HCLK / (2 + {value}). Cannot be higher than 80Mhz and PCLK2"
      ASISEL:
        description: "Adjacent ADC sampling interval select in ordinary shift mode: {value} + 5 * TADCCLK"
    ASISEL: [0, 0xF]
    ADCDIV: [0, 0xF]
    VBATEN:
      Disabled: [0, "VBAT channel disabled"]
      Enabled: [1, "VBAT channel enabled"]
    ITSRVEN:
      Disabled: [0, "Internal temperature sensor and Vintrv channel disabled"]
      Enabled: [1, "Internal temperature sensor and Vintrv channel enabled"]
U*RT?:
  CTRL2:
    ID7_4,ID3_0: [0, 0xF]
